<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento - Captura de Alumnos</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #802434; /* Fondo Guinda */
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            border-top: 10px solid #5e1a28;
        }

        h1 {
            color: #802434;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        p {
            color: #475569;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Animación del Círculo de Carga */
        .spinner {
            border: 8px solid #f3f4f6;
            border-top: 8px solid #802434;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 10px;
            font-style: italic;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Icono de Herramientas -->
        <div class="icon">🛠️</div>
        
        <h1>Captura de Alumnos Migrantes</h1>
        
        <p>
            La captura de alumnos migrantes de nivel secundaria finalizó satisfactoriamente con el 100% de las escuelas capturadas..
        </p>
        <p>
            Gracias...
        </p>

        <div class="spinner"></div>
        <div class="status-text">Verificando conexión...</div>
    </div>

    <script>
        // Esta función recargará la página cada 30 segundos
        // para que, cuando termines de cambiar el código, 
        // el usuario entre automáticamente a la aplicación.
        setInterval(function() {
            location.reload();
        }, 30000); // 30000 milisegundos = 30 segundos
    </script>
</body>
</html>
